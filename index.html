<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📋 All your links</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 transition-colors duration-300 relative flex flex-col min-h-screen">

  <!-- Cabecera -->
  <header class="flex justify-between items-center py-1 px-4 bg-gray-900 text-white shadow">
  <h1 class="text-xl font-semibold w-56"><a href="#" id="linksHomeBtn" class="text-fuchsia-600 hover:text-fuchsia-400 transition-colors">📋 All your links</a></h1>
  <div class="relative flex-1 max-w-md mx-auto flex"> 
    <input type="text" id="googleSearch" placeholder="Buscar en Google..." 
      class="flex-1 border h-7 p-0 rounded-l shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-800 text-sm" /> 
    
    <button id="googleBtn" class="bg-blue-600 px-3 h-7 rounded-r hover:bg-blue-700 flex items-center">Buscar</button>
    
    <ul id="suggestions" class="absolute top-full left-0 right-0 bg-white border rounded shadow mt-1 z-50 hidden"></ul>
  </div>
    <div class="flex gap-4 items-center">
      <button id="newLinkBtn" class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-500 transition">Nuevo enlace</button>
      <div id="profileOrb" class="w-10 h-10 rounded-full bg-gray-400 flex items-center justify-center cursor-pointer text-xl font-bold text-white">👤</div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Panel lateral -->
    <aside id="sidebar" 
    class="w-16 hover:w-56 p-4 border-r transition-all duration-300 ease-in-out 
          bg-gray-800 border-gray-700 flex flex-col items-center hover:items-stretch z-20 shrink-0">

    <h2 class="text-xl font-bold mb-6 text-center hidden hover:block p-1">Menú</h2>
    
    <nav class="flex flex-col gap-2 flex-1">
        
        <button id="enlacesBtn" class="py-2 px-3 rounded text-left hover:bg-gray-300 dark:hover:bg-gray-700 flex items-center">
            <span class="text-2xl w-8 text-center">🔗</span>
            <span class="ml-4 whitespace-nowrap hidden hover:block">Enlaces</span>
        </button>
        
        <button id="noticiasBtn" class="py-2 px-3 rounded text-left hover:bg-gray-300 dark:hover:bg-gray-700 flex items-center">
            <span class="text-2xl w-8 text-center">📰</span>
            <span class="ml-4 whitespace-nowrap hidden hover:block">Noticias</span>
        </button>
        
        <button id="perfilBtn" class="py-2 px-3 rounded text-left hover:bg-gray-300 dark:hover:bg-gray-700 flex items-center">
            <span class="text-2xl w-8 text-center">⚙️</span>
            <span class="ml-4 whitespace-nowrap hidden hover:block">Perfil</span>
        </button>
        
    </nav>
  </aside>

    <!-- Contenido principal -->
    <main id="mainContainer" class="flex-1 p-6 overflow-y-auto">
      <!-- Sección Enlaces -->
      <section id="enlacesSection">
        <div id="linksList" class="grid md:grid-cols-3 gap-4"></div>
      </section>

      <!-- Sección Noticias -->
      <section id="noticiasSection" class="hidden">
        <h2 class="text-2xl font-bold mb-4">Noticias</h2>
        <div id="newsList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </section>

      <!-- Sección Perfil -->
      <section id="profileSection" class="hidden p-6">
        <h2 class="text-2xl font-bold mb-4">Perfil</h2>
        <div class="flex gap-2 items-center mb-4">
          <button id="importDataBtn" class="bg-green-600 px-3 py-1 rounded hover:bg-green-500 transition">📂 Importar</button>
          <input type="file" id="importFileInput" accept=".json" class="hidden">
          <button id="exportDataBtn" class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-500 transition">💾 Exportar</button>
          <label class="flex items-center gap-1 text-sm">
            <input type="checkbox" id="openNewTab" class="accent-blue-500" />
            Abrir enlaces en nueva pestaña
          </label>
        </div>
        <div class="mb-4">
          <label class="block font-semibold mb-1">Background personalizado</label>
          <input type="file" id="bgUpload" accept="image/png, image/jpeg, .png, .jpg, .jpeg" class="border p-2 rounded w-full" />
          <button id="removeBg" class="mt-2 px-3 py-1 rounded bg-red-500 text-white hover:bg-red-600">Eliminar fondo</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Menú flotante Nuevo Enlace -->
  <div id="newLinkMenu" class="hidden fixed top-24 right-10 bg-white p-4 rounded shadow-lg w-72 z-50">
    <label class="block mb-1 font-semibold">Título</label>
    <input type="text" id="newLinkTitle" placeholder="Título del enlace" class="border p-2 rounded w-full mb-2" />
    <label class="block mb-1 font-semibold">URL</label>
    <input type="url" id="newLinkUrl" placeholder="https://..." class="border p-2 rounded w-full mb-2" />
    <label class="block mb-1 font-semibold">Categoría</label>
    <input type="text" id="newLinkCategory" placeholder="Categoría" class="border p-2 rounded w-full mb-2" />
    <div class="flex justify-end gap-2">
      <button id="cancelNewLink" class="px-3 py-1 rounded bg-gray-300 hover:bg-gray-400">Cancelar</button>
      <button id="saveNewLink" class="px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700">Guardar</button>
    </div>
  </div>

  <!-- Toast de notificación -->
  <div id="toast" class="hidden fixed bottom-5 right-5 bg-gray-900 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-500 opacity-0"></div>

  <script src="./js/ui.js" type="module"></script>
  <script src="./js/links.js" type="module"></script>
  <script src="./js/search.js" type="module"></script>
  <script src="./js/main.js" type="module"></script>
</body>
</html>
</body>
</html>
